
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              purple: {
                200: '#fbcfe8',
                800: '#62004a',
                900: '#7A005D',
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      /* Set root font size so 1rem = 14px. 
         Tailwind's rem-based classes will scale accordingly. */
      html {
        font-size: 14px;
      }

      body {
        font-family: 'Inter', sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      .variable-chip.chip-selected {
        outline: 2px solid rgba(122, 0, 93, 0.35);
        outline-offset: 1px;
      }
      .variable-chip.chip-selected[data-needs-recipient="true"] {
        outline-color: rgba(217, 119, 6, 0.45);
      }
    </style>
</head>
<body class="bg-[#F9FAFB] text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
